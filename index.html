<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menu Utama</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #ffffff;
    --bg2: #e8f4fd;
    --accent: #1a85c0;
    --wave1: #1a85c0;
    --wave2: #4ab8e8;
    --wave3: #72cef5;
  }

  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    background: #ffffff;
    font-family: 'Nunito', sans-serif;
  }

  body {
    position: fixed;
    inset: 0;
    padding-top: var(--sat);
    padding-bottom: var(--sab);
    padding-left: var(--sal);
    padding-right: var(--sar);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── Wave Background ─── */
  .wave-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    background: linear-gradient(180deg, #ffffff 0%, #e8f4fd 60%, #cce9f8 100%);
  }

  .wave-svg {
    position: absolute;
    width: 200%;
    bottom: 0;
  }

  .wave1 {
    animation: waveMove1 8s linear infinite;
    bottom: 0px;
    opacity: 0.55;
  }
  .wave2 {
    animation: waveMove2 11s linear infinite;
    bottom: 10px;
    opacity: 0.4;
  }
  .wave3 {
    animation: waveMove3 14s linear infinite;
    bottom: 20px;
    opacity: 0.3;
  }

  @keyframes waveMove1 {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes waveMove2 {
    0%   { transform: translateX(-50%); }
    100% { transform: translateX(0); }
  }
  @keyframes waveMove3 {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Blobs (light blue tones) */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
    animation: blobFloat var(--t, 10s) ease-in-out infinite alternate;
  }
  .blob1 { width: 280px; height: 280px; background: #4ab8e8; top: -60px; left: -80px; --t: 9s; }
  .blob2 { width: 220px; height: 220px; background: #1a85c0; bottom: 60px; right: -60px; --t: 12s; }
  .blob3 { width: 160px; height: 160px; background: #72cef5; top: 40%; left: 50%; --t: 7s; }

  @keyframes blobFloat {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(20px, 30px) scale(1.1); }
  }

  /* Floating bubbles decoration */
  .float-bubbles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 15;
    overflow: visible;
  }

  .fb {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.6);
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25) 0%, rgba(74,184,232,0.08) 40%, transparent 70%);
    box-shadow:
      inset 0 0 8px rgba(255,255,255,0.3),
      0 2px 8px rgba(26,133,192,0.15);
    animation: fbRise linear infinite;
  }

  @keyframes fbRise {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
  }

  /* ─── Header ─── */
  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 6px 20px 3px;
    flex-shrink: 0;
  }

  .header-logo {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0d5f8a, #1a85c0, #4ab8e8);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 5px;
    box-shadow:
      0 0 0 4px rgba(74,184,232,0.25),
      0 0 0 8px rgba(74,184,232,0.1),
      0 6px 24px rgba(26,133,192,0.5);
    animation: logoPulse 3s ease-in-out infinite;
    position: relative;
  }

  .header-logo::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    pointer-events: none;
  }

  @keyframes logoPulse {
    0%, 100% {
      box-shadow: 0 0 0 4px rgba(74,184,232,0.25), 0 0 0 8px rgba(74,184,232,0.1), 0 6px 24px rgba(26,133,192,0.4);
    }
    50% {
      box-shadow: 0 0 0 6px rgba(74,184,232,0.2), 0 0 0 14px rgba(74,184,232,0.06), 0 6px 36px rgba(26,133,192,0.6);
    }
  }

  .header-logo svg { width: 26px; height: 26px; }

  .header h1 {
    font-size: 0.95rem;
    font-weight: 900;
    color: #0d5f8a;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 6px rgba(74,184,232,0.25);
  }

  .header p {
    font-size: 0.65rem;
    color: rgba(26,133,192,0.6);
    margin-top: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ─── Bubble grid ─── */
  .bubble-grid {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    flex: 1;
    min-height: 0;
    padding: 6px 16px 8px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
  }

  /* Individual bubble card */
  .bubble {
    position: relative;
    border-radius: 28px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    cursor: pointer;
    text-decoration: none;
    overflow: hidden;
    transform-style: preserve-3d;
    perspective: 600px;
    animation: bubbleIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease;
    -webkit-user-select: none;
    user-select: none;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow:
      0 6px 24px rgba(26,133,192,0.18),
      0 2px 8px rgba(26,133,192,0.10),
      inset 0 1px 0 rgba(255,255,255,0.9);
    --c1: #e8f4fd;
    --c2: #b3dcf5;
    --glow: 74,184,232;
  }

  .bubble:nth-child(1)  { animation-delay: 0.05s; }
  .bubble:nth-child(2)  { animation-delay: 0.10s; }
  .bubble:nth-child(3)  { animation-delay: 0.15s; }
  .bubble:nth-child(4)  { animation-delay: 0.20s; }
  .bubble:nth-child(5)  { animation-delay: 0.25s; }
  .bubble:nth-child(6)  { animation-delay: 0.30s; }
  .bubble:nth-child(7)  { animation-delay: 0.35s; }
  .bubble:nth-child(8)  { animation-delay: 0.40s; }

  @keyframes bubbleIn {
    from { opacity: 0; transform: scale(0.5) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Glass background */
  .bubble::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: linear-gradient(145deg, var(--c1), var(--c2));
    opacity: 0.5;
    z-index: 0;
  }

  /* Glass border */
  .bubble::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    border: 1.5px solid rgba(74,184,232,0.35);
    background: transparent;
    z-index: 1;
  }

  /* Sheen highlight */
  .bubble-sheen {
    position: absolute;
    top: 6px;
    left: 14px;
    right: 14px;
    height: 38%;
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%);
    filter: blur(2px);
    z-index: 2;
    pointer-events: none;
  }

  .bubble:active {
    transform: scale(0.93) translateY(2px);
    box-shadow:
      0 3px 14px rgba(26,133,192,0.15),
      0 1px 4px rgba(26,133,192,0.08),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  /* Icon oval besar mengisi card */
  .bubble-icon {
    position: relative;
    z-index: 3;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(135deg, #1a85c0, #4ab8e8);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow:
      0 4px 18px rgba(74,184,232,0.5),
      inset 0 1px 2px rgba(255,255,255,0.4);
    animation: iconFloat 4s ease-in-out infinite;
    animation-delay: inherit;
    padding: 0 12px;
  }

  /* Warna unik tiap menu */
  /* 1. Jadwal Pelaksanaan - biru muda */
  .bubble:nth-child(1) .bubble-icon { background: linear-gradient(135deg, rgba(56,159,218,0.75), rgba(147,210,245,0.75)); box-shadow: 0 4px 18px rgba(56,159,218,0.4), inset 0 1px 2px rgba(255,255,255,0.4); border: 1.5px solid rgba(147,210,245,0.7); }
  /* 2. Jadwal Pengiriman - orange muda */
  .bubble:nth-child(2) .bubble-icon { background: linear-gradient(135deg, rgba(234,130,50,0.75), rgba(253,186,116,0.75)); box-shadow: 0 4px 18px rgba(234,130,50,0.4), inset 0 1px 2px rgba(255,255,255,0.4); border: 1.5px solid rgba(253,186,116,0.7); }
  /* 3. Daftar Kegiatan - biru */
  .bubble:nth-child(3) .bubble-icon { background: linear-gradient(135deg, rgba(26,133,192,0.75), rgba(74,184,232,0.75)); box-shadow: 0 4px 18px rgba(26,133,192,0.4), inset 0 1px 2px rgba(255,255,255,0.4); border: 1.5px solid rgba(74,184,232,0.7); }
  /* 4. Data Personil - orange */
  .bubble:nth-child(4) .bubble-icon { background: linear-gradient(135deg, rgba(220,100,0,0.75), rgba(251,146,60,0.75)); box-shadow: 0 4px 18px rgba(220,100,0,0.4), inset 0 1px 2px rgba(255,255,255,0.4); border: 1.5px solid rgba(251,146,60,0.7); }
  /* 5. Form Backup - biru tua */
  .bubble:nth-child(5) .bubble-icon { background: linear-gradient(135deg, rgba(10,60,110,0.75), rgba(26,100,160,0.75)); box-shadow: 0 4px 18px rgba(10,60,110,0.4), inset 0 1px 2px rgba(255,255,255,0.4); border: 1.5px solid rgba(26,100,160,0.7); }
  /* 6. Timesheet - orange tua */
  .bubble:nth-child(6) .bubble-icon { background: linear-gradient(135deg, rgba(160,60,0,0.75), rgba(210,90,20,0.75)); box-shadow: 0 4px 18px rgba(160,60,0,0.4), inset 0 1px 2px rgba(255,255,255,0.4); border: 1.5px solid rgba(210,90,20,0.7); }
  /* 7. Input Roleplay - merah */
  .bubble:nth-child(7) .bubble-icon { background: linear-gradient(135deg, rgba(220,38,38,0.75), rgba(248,113,113,0.75)); box-shadow: 0 4px 18px rgba(220,38,38,0.4), inset 0 1px 2px rgba(255,255,255,0.4); border: 1.5px solid rgba(248,113,113,0.7); }
  /* 8. Hubungi Admin - hijau */
  .bubble:nth-child(8) .bubble-icon { background: linear-gradient(135deg, rgba(13,148,136,0.75), rgba(52,211,153,0.75)); box-shadow: 0 4px 18px rgba(13,148,136,0.4), inset 0 1px 2px rgba(255,255,255,0.4); border: 1.5px solid rgba(52,211,153,0.7); }

  

  @keyframes iconFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-4px); }
  }

  .bubble-icon svg {
    width: 22px;
    height: 22px;
    color: #fff;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }

  /* Label (di dalam oval) */
  .bubble-label {
    position: relative;
    z-index: 3;
    font-size: 0.7rem;
    font-weight: 800;
    color: #0d3d5c;
    text-align: left;
    letter-spacing: 0.2px;
    line-height: 1.3;
    text-shadow: 0 1px 4px rgba(255,255,255,0.6);
    animation: textBreath 3s ease-in-out infinite;
  }

  @keyframes textBreath {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }

  .bubble:nth-child(1) .bubble-label { animation-delay: 0.0s; }
  .bubble:nth-child(2) .bubble-label { animation-delay: 0.4s; }
  .bubble:nth-child(3) .bubble-label { animation-delay: 0.8s; }
  .bubble:nth-child(4) .bubble-label { animation-delay: 1.2s; }
  .bubble:nth-child(5) .bubble-label { animation-delay: 1.6s; }
  .bubble:nth-child(6) .bubble-label { animation-delay: 2.0s; }
  .bubble:nth-child(7) .bubble-label { animation-delay: 2.4s; }
  .bubble:nth-child(8) .bubble-label { animation-delay: 2.8s; }

  /* Ripple overlay */
  #ripple-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    overflow: hidden;
  }

  .ripple-circle {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    opacity: 0.85;
    animation: rippleExpand 0.65s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
  }

  @keyframes rippleExpand {
    0%   { transform: scale(0); opacity: 0.85; }
    80%  { opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Footer */
  .footer {
    position: relative;
    z-index: 10;
    padding: 4px 0 6px;
    flex-shrink: 0;
    font-size: 0.62rem;
    color: #0d5f8a;
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>

<div class="float-bubbles" id="floatBubbles"></div>
<script>
  // Floating bubbles
  const fbEl = document.getElementById('floatBubbles');
  const colors = ['#4ab8e8','#1a85c0','#72cef5','#a8ddf5','#cce9f8','#2a9ad0','#5dcfff'];
  for (let i = 0; i < 16; i++) {
    const b = document.createElement('div');
    b.className = 'fb';
    const size = Math.random() * 50 + 18;
    const dur  = Math.random() * 14 + 10;
    const delay = Math.random() * 12;
    const c = colors[Math.floor(Math.random() * colors.length)];
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:-${size}px;
      border-color:${c}55;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    fbEl.appendChild(b);
  }

  // Ripple transition
  const rippleOverlay = document.getElementById('ripple-overlay');
  const bubbleColors = [
    '#389fda','#ea8232','#1a85c0','#dc6400',
    '#0a3c6e','#a03c00','#dc2626','#0d9488'
  ];

  document.querySelectorAll('.bubble').forEach((card, idx) => {
    card.addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.getAttribute('href');
      const rect = this.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      // Hitung radius agar menutupi seluruh layar
      const maxDist = Math.hypot(
        Math.max(cx, window.innerWidth - cx),
        Math.max(cy, window.innerHeight - cy)
      );
      const size = maxDist * 2.2;

      const ripple = document.createElement('div');
      ripple.className = 'ripple-circle';
      ripple.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${cx - size / 2}px;
        top: ${cy - size / 2}px;
        background: ${bubbleColors[idx] || '#1a85c0'};
      `;
      rippleOverlay.appendChild(ripple);

      // Navigasi setelah animasi selesai
      setTimeout(() => {
        window.location.href = href;
      }, 600);
    });
  });
  document.querySelectorAll('.bubble').forEach(card => {
    const handleMove = (x, y, rect) => {
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      const rotY = ((x - cx) / (rect.width  / 2)) * 10;
      const rotX = ((y - cy) / (rect.height / 2)) * -10;
      card.style.transform = `perspective(600px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.06)`;
    };

    card.addEventListener('mousemove', e => {
      handleMove(e.clientX, e.clientY, card.getBoundingClientRect());
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });

    card.addEventListener('touchmove', e => {
      const t = e.touches[0];
      handleMove(t.clientX, t.clientY, card.getBoundingClientRect());
    }, { passive: true });
    card.addEventListener('touchend', () => {
      card.style.transform = '';
    });
  });
</script>
