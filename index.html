<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SATPAM MAGELANG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4846256718164486" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --blue:       #1565c0;
    --blue-mid:   #1e88e5;
    --blue-soft:  #e8f2fc;
    --white:      #ffffff;
    --card-border:#d6e8f8;
    --card-line:  #64a8e8;
    --icon-bg:    #eef5fd;
    --text-dark:  #1a2b3c;
    --text-muted: #90aabf;
    --radius:     16px;
    --radius-sm:  10px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #ffffff;
  }

  body {
    display: flex;
    flex-direction: column;
    height: calc(var(--vh, 1vh) * 100);
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    background: var(--blue);
    padding: 16px 20px 14px;
    text-align: center;
    border-radius: 0 0 24px 24px;
  }

  .logo {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: rgba(255,255,255,.15);
    border: 1.5px solid rgba(255,255,255,.3);
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 6px;
  }

  header h1 {
    font-size: 16px; font-weight: 700;
    color: #ffffff;
    letter-spacing: .3px;
  }

  header p {
    font-size: 11px;
    color: rgba(255,255,255,.65);
    margin-top: 2px;
  }

  /* ── GRID MENU ── */
  .menu {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 1fr;
    gap: 8px;
    padding: 10px 14px 6px;
  }

  /* kartu ke-7 rata tengah */
  .card:last-child:nth-child(odd) {
    grid-column: 1 / -1;
    max-width: 50%;
    margin: 0 auto;
    width: 100%;
  }

  /* ── CARD ── */
  .card {
    border-radius: var(--radius);
    padding: 8px 10px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    background: var(--white);
    border: 1px solid var(--card-border);
    box-shadow:
      0 1px 0 rgba(255,255,255,.9) inset,
      0 4px 0 #94bde8,
      0 6px 12px rgba(21,101,192,.12);
    position: relative;
    overflow: hidden;
    transition: transform .15s ease, box-shadow .15s ease;
    animation: fadeUp .35s both;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 0 0 var(--radius) var(--radius);
    opacity: .7;
  }

  /* garis bawah semua kartu — satu warna */
  .card::after { background: var(--card-line); }

  .card:nth-child(1) { animation-delay: .05s }
  .card:nth-child(2) { animation-delay: .10s }
  .card:nth-child(3) { animation-delay: .15s }
  .card:nth-child(4) { animation-delay: .20s }
  .card:nth-child(5) { animation-delay: .25s }
  .card:nth-child(6) { animation-delay: .30s }
  .card:nth-child(7) { animation-delay: .35s }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:active {
    transform: translateY(4px);
    box-shadow:
      0 1px 0 rgba(255,255,255,.9) inset,
      0 1px 0 #94bde8,
      0 2px 6px rgba(21,101,192,.1);
  }

  /* ── ICON ── */
  .icon {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    background: var(--icon-bg);
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  /* ── LABEL ── */
  .label {
    font-size: 11px; font-weight: 700;
    text-align: center;
    line-height: 1.3;
    color: var(--text-dark);
  }

  /* ── ADMIN BUTTON ── */
  .admin-wrap {
    flex-shrink: 0;
    text-align: center;
    padding: 4px 14px 6px;
  }

  .admin {
    display: inline-flex;
    align-items: center; gap: 6px;
    padding: 8px 22px;
    border-radius: 30px;
    text-decoration: none;
    background: var(--white);
    border: 1.5px solid var(--card-border);
    font-size: 11px; font-weight: 700;
    color: var(--blue);
    box-shadow: 0 1px 4px rgba(21,101,192,.08);
    transition: transform .15s ease;
  }

  .admin:active {
    transform: scale(.97);
  }

  /* ── FOOTER ── */
  footer {
    flex-shrink: 0;
    text-align: center;
    padding: 4px 16px 6px;
    font-size: 10px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── RIPPLE ── */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(30,136,229,.12);
    transform: scale(0);
    animation: rippleAnim .5s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  /* ── TRANSITION OVERLAY ── */
  #overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--blue);
    transform: scaleX(0);
    transform-origin: left;
    pointer-events: none;
  }
  #overlay.go {
    animation: slideIn .35s cubic-bezier(.77,0,.18,1) forwards;
  }
  @keyframes slideIn {
    to { transform: scaleX(1); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🛡️</div>
  <h1>SATPAM MAGELANG</h1>
  <p>Manajemen Jadwal &amp; Personil</p>
</header>

<section class="menu">
  <a href="pages/jadwal.html?mode=PEL" class="card">
    <div class="icon">📅</div>
    <span class="label">JADWAL PELAKSANAAN KERJA</span>
  </a>
  <a href="pages/jadwal.html?mode=PEN" class="card">
    <div class="icon">📤</div>
    <span class="label">JADWAL PENGIRIMAN ABSENSI</span>
  </a>
  <a href="pages/kegiatan.html" class="card">
    <div class="icon">🎉</div>
    <span class="label">DAFTAR KEGIATAN</span>
  </a>
  <a href="pages/database.html" class="card">
    <div class="icon">👥</div>
    <span class="label">DATA PERSONIL</span>
  </a>
  <a href="pages/backup-personil.html" class="card">
    <div class="icon">📋</div>
    <span class="label">FORM PERSONIL BACKUP</span>
  </a>
  <a href="pages/timesheet.html" class="card">
    <div class="icon">⏱️</div>
    <span class="label">TIMESHEET MAKER</span>
  </a>
  <a href="pages/roleplay.html" class="card">
    <div class="icon">🎭</div>
    <span class="label">INPUT ROLEPLAY</span>
  </a>
</section>

<div class="admin-wrap">
  <a href="pages/hubungi-admin.html" class="admin">✉️ HUBUNGI ADMIN</a>
</div>

<footer>© 2026 SATPAM MAGELANG &nbsp;·&nbsp; Dikembangkan oleh <strong style="color:#888">TUKANG REWANG</strong></footer>

<div id="overlay"></div>

<script>
  /* -- viewport height fix for mobile -- */
  function setVh() {
    document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
  }
  setVh();
  window.addEventListener('resize', setVh);
  window.addEventListener('orientationchange', () => setTimeout(setVh, 150));

  /* -- back button lock -- */
  history.replaceState({ page: 'index' }, '');
  window.addEventListener('popstate', () => history.replaceState({ page: 'index' }, ''));

  /* -- ripple + navigate -- */
  document.querySelectorAll('.card, .admin').forEach(el => {
    el.addEventListener('click', function(e) {
      /* ripple */
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height) * 1.5;
      const r = document.createElement('span');
      r.className = 'ripple';
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(r);
      r.addEventListener('animationend', () => r.remove());

      /* navigate */
      const href = this.getAttribute('href');
      if (!href || href.startsWith('#')) return;
      e.preventDefault();
      document.getElementById('overlay').classList.add('go');
      setTimeout(() => { window.location.href = href; }, 360);
    });
  });

  /* -- fade in on load -- */
  document.body.style.opacity = '0';
  document.body.style.transition = 'opacity .3s ease';
  window.addEventListener('load', () => setTimeout(() => document.body.style.opacity = '1', 20));
</script>
</body>
</html>
