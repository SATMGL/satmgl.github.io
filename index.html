<meta charset="UTF-8">
<title>SATPAM MAGELANG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── ZORO THEME — Hijau Tua · Hitam · Gold ── */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%; overflow:hidden;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(160deg, #f9fbe7 0%, #e8f5e9 100%);
  display:flex; flex-direction:column;
}
body { height: calc(var(--vh, 1vh) * 100); }

/* ── HEADER ── */
header {
  flex-shrink:0;
  background: linear-gradient(120deg, #1a2e0e, #2e7d32, #1b5e20);
  padding: clamp(8px,1.8vh,20px) 20px clamp(6px,1.4vh,16px);
  text-align:center; position:relative; overflow:hidden;
}
header::before {
  content:''; position:absolute; inset:0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.header-inner { position:relative; z-index:1; }
.header-logo {
  width: clamp(34px,5vh,52px); height: clamp(34px,5vh,52px);
  border-radius:12px; margin:0 auto clamp(4px,.8vh,10px);
  background: rgba(249,168,37,.2);
  border:2px solid rgba(249,168,37,.6);
  display:flex; align-items:center; justify-content:center;
  font-size: clamp(20px,3.2vh,28px);
  box-shadow: 0 4px 20px rgba(0,0,0,.25), 0 0 12px rgba(249,168,37,.3);
  animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
header h1 {
  font-size: clamp(15px,2.4vh,22px); font-weight:800;
  color:#f9d878; letter-spacing:.3px;
  text-shadow: 0 2px 8px rgba(0,0,0,.4), 0 0 20px rgba(249,216,120,.3);
  animation: slideUp .4s .15s both;
}
header p {
  font-size: clamp(10px,1.4vh,13px); color:rgba(200,230,180,.9);
  margin-top:3px; animation: slideUp .4s .25s both;
}
@keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── MENU GRID ── */
.menu {
  flex:1; min-height:0; display:grid;
  grid-template-columns: repeat(2,1fr);
  grid-template-rows: repeat(3,1fr);
  gap: clamp(5px,1vh,10px);
  padding: clamp(6px,1.2vh,12px) clamp(12px,3vw,18px) clamp(4px,.8vh,8px);
  perspective: 800px;
}

.card {
  border-radius:16px;
  padding: 4px 8px; min-height:0;
  text-decoration:none;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:clamp(3px,.6vh,7px);
  position:relative; overflow:hidden;
  animation: cardIn .45s both;

  background: linear-gradient(160deg, #ffffff 0%, #e8f5e9 100%);
  border: 1.5px solid rgba(255,255,255,.9);
  border-bottom-color: #a5d6a7;
  border-right-color: #b2dfb2;

  box-shadow:
    0 1px 0   rgba(255,255,255,.9) inset,
    1px 0 0   rgba(255,255,255,.6) inset,
    0 6px 0   #81c784,
    0 8px 16px rgba(27,94,32,.18),
    0 2px 4px  rgba(27,94,32,.12);

  transform: translateY(0) rotateX(2deg);
  transform-style: preserve-3d;
  transition: transform .18s ease, box-shadow .18s ease;
  will-change: transform;
}
.card:nth-child(1){animation-delay:.08s}
.card:nth-child(2){animation-delay:.15s}
.card:nth-child(3){animation-delay:.22s}
.card:nth-child(4){animation-delay:.29s}
.card:nth-child(5){animation-delay:.36s}
.card:nth-child(6){animation-delay:.43s}
@keyframes cardIn {
  from{opacity:0;transform:translateY(16px) scale(.97)}
  to  {opacity:1;transform:translateY(0)    scale(1)}
}

.card:hover {
  transform: translateY(-4px) rotateX(0deg);
  box-shadow:
    0 1px 0   rgba(255,255,255,.9) inset,
    1px 0 0   rgba(255,255,255,.6) inset,
    0 10px 0  #66bb6a,
    0 14px 28px rgba(27,94,32,.22),
    0 4px 8px  rgba(27,94,32,.15);
}
.card:active {
  transform: translateY(4px) rotateX(4deg);
  box-shadow:
    0 1px 0   rgba(255,255,255,.9) inset,
    0 2px 0   #a5d6a7,
    0 3px 8px rgba(27,94,32,.15);
}

/* accent kiri — gold untuk semua agar konsisten Zoro */
.card::before {
  content:''; position:absolute;
  left:0; top:18%; bottom:18%;
  width:3px; border-radius:4px;
}
.c1::before { background:#f9a825; }
.c2::before { background:#2e7d32; }
.c3::before { background:#f57f17; }
.c4::before { background:#1b5e20; }
.c5::before { background:#f9d878; }
.c6::before { background:#388e3c; }

/* icon wrap */
.card-icon-wrap {
  width: clamp(20px,3vh,32px); height: clamp(20px,3vh,32px);
  border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size: clamp(10px,1.7vh,16px);
  background: rgba(255,255,255,.85);
  box-shadow: 0 2px 6px rgba(27,94,32,.15), 0 1px 0 rgba(255,255,255,.9) inset;
  border: 1px solid rgba(165,214,167,.6);
}

.card-label {
  font-size: clamp(10px,1.6vh,14px); font-weight:700;
  text-align:center; line-height:1.3; letter-spacing:.2px;
  color: #1a3a0e;
  text-shadow: 0 1px 0 rgba(255,255,255,.8);
}

/* ── ADMIN ── */
.admin-wrap {
  flex-shrink:0; text-align:center;
  padding: 0 16px clamp(4px,.7vh,8px);
  animation: slideUp .4s .5s both;
}
.admin {
  display:inline-flex; align-items:center; gap:6px;
  padding: clamp(6px,.9vh,10px) 22px;
  border-radius:40px; text-decoration:none;
  background: linear-gradient(120deg, #fff9e6, #fff);
  border:1.5px solid #f9a825;
  font-size: clamp(10px,1.3vh,12px); font-weight:700;
  color:#c67a00;
  box-shadow: 0 3px 12px rgba(249,168,37,.2), 0 4px 0 #e6941a;
  transition:.2s;
}
.admin:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(249,168,37,.3), 0 6px 0 #e6941a; }
.admin:active { transform:translateY(2px); box-shadow:0 1px 6px rgba(249,168,37,.2), 0 1px 0 #e6941a; }

/* ── FOOTER ── */
footer {
  flex-shrink:0; text-align:center;
  padding: clamp(3px,.6vh,6px) 16px;
  font-size: clamp(9px,1.1vh,11px); color:#4a7c34;
  font-style:italic;
}

.ads-wrapper { display:none; }

/* ── RIPPLE ── */
.ripple {
  position:absolute; border-radius:50%;
  background: rgba(76,175,80,.25);
  transform: scale(0);
  animation: rippleAnim .55s linear;
  pointer-events:none;
}
@keyframes rippleAnim {
  to { transform:scale(4); opacity:0; }
}

/* ── PAGE TRANSITION OVERLAY ── */
#page-transition {
  position:fixed; inset:0; z-index:9999;
  pointer-events:none;
  display:flex; align-items:center; justify-content:center;
}
#page-transition .slash {
  position:absolute; inset:0;
  background: linear-gradient(120deg, #1b5e20, #2e7d32);
  transform: scaleX(0);
  transform-origin: left;
}
#page-transition .slash2 {
  background: linear-gradient(120deg, #388e3c, #66bb6a);
  transform-origin: left;
  animation-delay:.08s;
  opacity: .7;
}
#page-transition.go .slash {
  animation: slashIn .38s cubic-bezier(.77,0,.18,1) forwards;
}
#page-transition.go .slash2 {
  animation: slashIn .38s .06s cubic-bezier(.77,0,.18,1) forwards;
}
#page-transition.go .sword {
  animation: swordSpin .4s .15s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes slashIn {
  from { transform:scaleX(0); }
  to   { transform:scaleX(1); }
}
.sword {
  position:relative; z-index:2;
  font-size: clamp(40px,8vh,72px);
  opacity:0;
  filter: drop-shadow(0 0 18px rgba(165,214,167,.9));
}
@keyframes swordSpin {
  from { opacity:0; transform:rotate(-120deg) scale(.3); }
  to   { opacity:1; transform:rotate(0deg)    scale(1);  }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo">🛡️</div>
    <h1>SATPAM MAGELANG</h1>
    <p>Manajemen Jadwal &amp; Personil</p>
  </div>
</header>

<section class="menu">
  <a href="pages/jadwal.html?mode=PEL" class="card c1">
    <div class="card-icon-wrap">📅</div>
    <span class="card-label">JADWAL PELAKSANAAN KERJA</span>
  </a>
  <a href="pages/jadwal.html?mode=PEN" class="card c2">
    <div class="card-icon-wrap">📤</div>
    <span class="card-label">JADWAL PENGIRIMAN ABSENSI</span>
  </a>
  <a href="pages/kegiatan.html" class="card c3">
    <div class="card-icon-wrap">🎉</div>
    <span class="card-label">DAFTAR KEGIATAN</span>
  </a>
  <a href="pages/database.html" class="card c4">
    <div class="card-icon-wrap">👥</div>
    <span class="card-label">DATA PERSONIL</span>
  </a>
  <a href="pages/backup-personil.html" class="card c5">
    <div class="card-icon-wrap">📋</div>
    <span class="card-label">FORM PERSONIL BACKUP</span>
  </a>
  <a href="pages/timesheet.html" class="card c6">
    <div class="card-icon-wrap">⏱️</div>
    <span class="card-label">TIMESHEET MAKER</span>
  </a>
</section>

<div class="admin-wrap">
  <a href="pages/hubungi-admin.html" class="admin">✉️ &nbsp;HUBUNGI ADMIN</a>
</div>

<div class="ads-wrapper">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-4846256718164486"
       data-ad-slot="ISI_DENGAN_AD_SLOT"
       data-ad-format="horizontal"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<footer>© 2026 SATPAM MAGELANG &nbsp;·&nbsp; Dikembangkan oleh <strong style="color:#888;">TUKANG REWANG</strong></footer>

<!-- PAGE TRANSITION OVERLAY -->
<div id="page-transition">
  <div class="slash"></div>
  <div class="slash slash2"></div>
  <div class="sword">🗡️</div>
</div>

<script>
function setVh() {
  document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
}
setVh();
window.addEventListener('resize', setVh);
window.addEventListener('orientationchange', () => setTimeout(setVh, 150));

/* ── Kunci back button HP — di index tidak kemana-mana ── */
history.replaceState({ page: 'index' }, '');
window.addEventListener('popstate', () => {
  history.replaceState({ page: 'index' }, '');
});

/* ── RIPPLE on card click ── */
document.querySelectorAll('.card, .admin').forEach(el => {
  el.addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 1.5;
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top  - size / 2;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
    this.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  });
});

/* ── PAGE TRANSITION on navigate ── */
document.querySelectorAll('.card, .admin').forEach(el => {
  el.addEventListener('click', function(e) {
    const href = this.getAttribute('href');
    if (!href || href.startsWith('#')) return;
    e.preventDefault();
    const overlay = document.getElementById('page-transition');
    overlay.classList.add('go');
    setTimeout(() => { window.location.href = href; }, 480);
  });
});

/* ── Fade in saat halaman load (dari navigasi kembali) ── */
document.body.style.opacity = '0';
document.body.style.transition = 'opacity .35s ease';
window.addEventListener('load', () => {
  setTimeout(() => { document.body.style.opacity = '1'; }, 30);
});
</script>
</body>
</html>
