<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Kerja</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/jadwal.css">
  <link id="tema-mode" rel="stylesheet" href="">
</head>
<body>

  <header>
    <button id="btn-kembali" onclick="aksiKembali()"
      style="position:absolute; left:0; top:0; height:100%; width:8vh; border:none;
      border-right:2px solid #000; background:transparent; font-family:'Share Tech Mono',monospace;
      font-size:5vh; cursor:pointer; display:flex; align-items:center; justify-content:center;"
      onmouseover="this.style.background='#000';this.style.color='#fff'"
      onmouseout="this.style.background='transparent';this.style.color='#000'">&#8592;</button>
    <button id="btn-bantuan" onclick="window.location.href='../pages/pusat-bantuan.html'"
      style="position:absolute; right:0; top:0; height:100%; padding:0 1.5vw;
      border:none; border-left:2px solid #000; background:transparent;
      font-family:'Share Tech Mono',monospace; font-size:clamp(7px,1.2vh,11px);
      cursor:pointer; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:0.3vh; white-space:nowrap;"
      onmouseover="this.style.background='#000';this.style.color='#fff'"
      onmouseout="this.style.background='transparent';this.style.color='#000'">
      <span style="font-size:clamp(12px,2.2vh,20px); line-height:1;">📞</span>
      <span style="letter-spacing:0.05em;">BANTUAN</span>
    </button>
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:0.3vh; padding:0 9vh; box-sizing:border-box; width:100%;">
      <span id="header-judul" style="font-family:'Share Tech Mono',monospace; font-weight:bold;
        font-size:clamp(7px,2vh,20px); letter-spacing:0.1em;
        text-align:center; word-break:break-word; line-height:1.3;">
        JADWAL PELAKSANAAN KERJA
      </span>
      <span style="font-family:'Share Tech Mono',monospace; font-size:clamp(6px,1.2vh,12px);
        letter-spacing:0.3em; color:#555; white-space:nowrap;">
        &#9632;&#9632;&#9632;
      </span>
    </div>
  </header>

  <main>

    <!-- ── PANEL PILIH BULAN & UNIT ── -->
    <div class="panel">
      <div style="display:flex; align-items:center; justify-content:center; gap:clamp(4px,4vw,20px); height:100%; box-sizing:border-box; padding:0 2vw;">

        <!-- BULAN -->
        <div style="display:flex; flex-direction:column; align-items:center; gap:0.8vh;">
          <div id="wrap-bulan" style="width:clamp(90px,38vw,160px); min-height:5vh; height:auto; border:2px solid #000;
            display:flex; align-items:center; justify-content:center;
            position:relative; overflow:hidden; background:transparent;
            transition:background 0.2s, border-color 0.2s;">
            <button id="btn-bulan" onclick="openModal('bulan')" disabled
              style="width:100%; min-height:5vh; height:auto; border:none; background:transparent;
              font-family:'Share Tech Mono',monospace; font-size:clamp(7px,1.3vh,12px);
              cursor:not-allowed; letter-spacing:0.02em; opacity:0.5; font-weight:normal;
              padding:clamp(4px,0.7vh,8px) 4vh clamp(4px,0.7vh,8px) 0.5vw;
              white-space:normal; word-break:break-word; text-align:center; line-height:1.3; box-sizing:border-box;">
              📅 PILIH BULAN</button>
            <button id="x-bulan" onclick="konfirmasiResetBulan()"
              style="display:none; position:absolute; right:0; top:0; height:100%; width:4vh;
              flex-shrink:0; border:none; border-left:2px solid #c62828; background:#c62828; color:#fff;
              font-family:'Share Tech Mono',monospace; font-size:2vh; cursor:pointer;">&#10005;</button>
          </div>
          <div id="info-bulan" style="font-family:'Share Tech Mono',monospace; font-size:clamp(8px,1.4vh,12px); color:#555;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:clamp(90px,38vw,160px);">&#9203; Memuat data bulan...</div>
        </div>

        <!-- UNIT -->
        <div style="display:flex; flex-direction:column; align-items:center; gap:0.8vh;">
          <div id="wrap-unit" style="width:clamp(90px,38vw,160px); min-height:5vh; height:auto; border:2px solid #000;
            display:flex; align-items:center; justify-content:center;
            position:relative; overflow:hidden; background:transparent;
            transition:background 0.2s, border-color 0.2s;">
            <button id="btn-unit" onclick="openModal('unit')" disabled
              style="width:100%; min-height:5vh; height:auto; border:none; background:transparent;
              font-family:'Share Tech Mono',monospace; font-size:clamp(7px,1.3vh,12px);
              cursor:not-allowed; letter-spacing:0.02em; opacity:0.5; font-weight:normal;
              padding:clamp(4px,0.7vh,8px) 4vh clamp(4px,0.7vh,8px) 0.5vw;
              white-space:normal; word-break:break-word; text-align:center; line-height:1.3; box-sizing:border-box;">
              🏢 PILIH UNIT</button>
            <button id="x-unit" onclick="konfirmasiResetUnit()"
              style="display:none; position:absolute; right:0; top:0; height:100%; width:4vh;
              flex-shrink:0; border:none; border-left:2px solid #c62828; background:#c62828; color:#fff;
              font-family:'Share Tech Mono',monospace; font-size:2vh; cursor:pointer;">&#10005;</button>
          </div>
          <div id="info-unit" style="font-family:'Share Tech Mono',monospace; font-size:clamp(8px,1.4vh,12px); color:#555;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:clamp(90px,38vw,160px);">&#9203; Memuat data unit...</div>
        </div>

      </div>
    </div>

    <!-- ── MODAL PILIH BULAN / UNIT ── -->
    <div id="modal-overlay"
      style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
      z-index:100; align-items:center; justify-content:center;">
      <div id="modal-box" onclick="event.stopPropagation()"
        style="background:#fff; border:2px solid #000; width:clamp(240px,92vw,500px); max-height:80vh;
        display:flex; flex-direction:column; font-family:'Share Tech Mono',monospace; position:relative;">
        <div id="modal-title"
          style="min-height:6vh; border-bottom:2px solid #000; display:flex; align-items:center;
          justify-content:center; font-weight:bold; font-size:clamp(12px,2vh,18px);
          flex-shrink:0; position:relative; padding:0.5vh 6vh 0.5vh 1vh; box-sizing:border-box;">
          <span id="modal-title-text" style="text-align:center;"></span>
          <button onclick="closeModal()"
            style="position:absolute; right:0; top:0; height:100%; width:6vh; border:none;
            border-left:2px solid #c62828; background:#c62828; color:#fff;
            font-family:'Share Tech Mono',monospace; font-size:clamp(12px,2vh,18px); cursor:pointer;
            display:flex; align-items:center; justify-content:center;">&#10005;</button>
        </div>
        <div id="modal-content"
          style="overflow-y:auto; overflow-x:hidden; padding:1.5vh 1.5vw; display:grid; gap:0.8vh 0.8vw;
          grid-template-columns:repeat(auto-fill,minmax(clamp(72px,24vw,110px),1fr)); box-sizing:border-box;"></div>
        <div id="modal-footer"
          style="min-height:6vh; border-top:2px solid #000; display:flex;
          align-items:center; justify-content:center; flex-shrink:0; padding:0.5vh;">
          <button onclick="closeModal()"
            style="height:5vh; border:2px solid #000; background:#fff; padding:0 3vw;
            font-family:'Share Tech Mono',monospace; font-size:clamp(11px,1.8vh,16px); cursor:pointer;
            white-space:nowrap;"
            onmouseover="this.style.background='#000';this.style.color='#fff'"
            onmouseout="this.style.background='#fff';this.style.color='#000'">TUTUP</button>
        </div>
      </div>
    </div>

    <!-- ── RUNNING TEKS INFO MODE ── -->
    <div class="running-teks-wrap">
      <span class="running-teks" id="running-teks-isi">
        &#9632; MEMUAT MODE...
      </span>
    </div>

    <!-- ── TABEL JADWAL ── -->
    <div class="box-jadwal">
      <div class="jadwal-ticker" id="jadwal-ticker">
        <div class="jadwal-ticker-track" id="jadwal-ticker-track">
          <span id="jadwal-ticker-text"></span>
        </div>
      </div>
      <div class="jadwal">
        <div class="jadwal-judul" id="jadwal-judul-tabel"><span>JADWAL KERJA</span></div>
        <div class="jadwal-scroll-wrapper">
          <table id="tabel-jadwal">
            <colgroup id="colgroup-hari">
              <col class="col-no"><col class="col-nama">
            </colgroup>
            <thead id="thead-header">
              <tr id="tr-hari">
                <th class="col-no" rowspan="2">NO</th>
                <th class="col-nama" rowspan="2">NAMA</th>
              </tr>
              <tr id="tr-tanggal"></tr>
            </thead>
            <tbody id="tbody-data"></tbody>
          </table>
        </div>
      </div>

      <div class="jadwal-fader">
        <div class="jadwal-fader-track">
          <div class="jadwal-fader-knob" id="fader-knob">
            <div class="fader-grip"></div>
            <div class="fader-grip"></div>
            <div class="fader-grip"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── PANEL BAWAH ── -->
    <div class="panel-bottom">
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr;
        align-items:center; height:100%; box-sizing:border-box;">

        <!-- KIRI: UNDO / REDO (selalu kolom kiri, show/hide via JS) -->
        <div id="wrap-undo-redo"
          style="display:flex; align-items:center; justify-content:center; height:5vh;">
          <button id="btn-undo" disabled onclick="lakukanUndo()"
            style="visibility:hidden; height:100%; padding:0 1vw; border:2px solid #000; border-right:none;
            background:#fff; font-family:'Share Tech Mono',monospace; font-size:clamp(7px,1.2vh,12px);
            cursor:not-allowed; opacity:0.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"
            onmouseover="if(!this.disabled){this.style.background='#000';this.style.color='#fff'}"
            onmouseout="this.style.background='#fff';this.style.color='#000'">&#8617; UNDO</button>
          <button id="btn-redo" disabled onclick="lakukanRedo()"
            style="visibility:hidden; height:100%; padding:0 1vw; border:2px solid #000;
            background:#fff; font-family:'Share Tech Mono',monospace; font-size:clamp(7px,1.2vh,12px);
            cursor:not-allowed; opacity:0.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"
            onmouseover="if(!this.disabled){this.style.background='#000';this.style.color='#fff'}"
            onmouseout="this.style.background='#fff';this.style.color='#000'">REDO &#8618;</button>
        </div>

        <!-- TENGAH: DOWNLOAD / BATAL -->
        <div style="display:flex; align-items:center; justify-content:center; height:5vh; padding:0 1vw;">
          <button id="btn-download" onclick="downloadJadwal()" disabled
            style="width:100%; height:100%; border:2px solid #000; background:transparent;
            font-family:'Share Tech Mono',monospace; font-size:clamp(7px,1.3vh,12px);
            letter-spacing:0.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"
            onmouseover="if(!this.disabled){this.style.background='#000';this.style.color='#fff'}"
            onmouseout="this.style.background='transparent';this.style.color='#000'">&#11015; DOWNLOAD</button>
        </div>

        <!-- KANAN: EDIT JADWAL / SIMPAN -->
        <div style="display:flex; align-items:center; justify-content:center; height:5vh; padding:0 1vw;">
          <button id="btn-edit" onclick="editJadwal()" disabled
            style="width:100%; height:100%; border:2px solid #000; background:transparent;
            font-family:'Share Tech Mono',monospace; font-size:clamp(7px,1.3vh,12px);
            letter-spacing:0.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"
            onmouseover="if(!this.disabled){this.style.background='#000';this.style.color='#fff'}"
            onmouseout="this.style.background='transparent';this.style.color='#000'">&#9998; EDIT JADWAL</button>
        </div>

      </div>
    </div>

  </main>

  <footer>
    <!-- KIRI: zoom preset -->
    <div id="wrap-zoom-preset"
      style="position:absolute; left:0; top:0; height:100%;
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:0 clamp(4px,1.2vw,12px);
      box-sizing:border-box; overflow:hidden;">
      <div style="display:flex; align-items:center; gap:clamp(3px,1vw,8px);">
        <button id="z-05" onclick="setZoomPreset(0.5)"
          title="Kecil — lihat lebih banyak hari"
          style="height:clamp(16px,2.6vh,26px); padding:0 clamp(4px,1.2vw,10px);
          border-radius:40px; border:none;
          background:#555; color:#fff;
          font-family:'Share Tech Mono',monospace; font-size:clamp(6px,1.1vh,10px);
          cursor:pointer; letter-spacing:0.03em; white-space:nowrap;">
          🔍 KECIL</button>
        <button id="z-07" onclick="setZoomPreset(0.7)"
          title="Sedang"
          style="height:clamp(16px,2.6vh,26px); padding:0 clamp(4px,1.2vw,10px);
          border-radius:40px; border:none;
          background:#000; color:#fff; font-weight:bold;
          box-shadow:0 0 0 2px #fff, 0 0 0 4px #000;
          font-family:'Share Tech Mono',monospace; font-size:clamp(6px,1.1vh,10px);
          cursor:pointer; letter-spacing:0.03em; white-space:nowrap;"
          data-aktif="1">
          🔍 SEDANG</button>
        <button id="z-10" onclick="setZoomPreset(1.0)"
          title="Besar — ukuran normal"
          style="height:clamp(16px,2.6vh,26px); padding:0 clamp(4px,1.2vw,10px);
          border-radius:40px; border:none;
          background:#555; color:#fff;
          font-family:'Share Tech Mono',monospace; font-size:clamp(6px,1.1vh,10px);
          cursor:pointer; letter-spacing:0.03em; white-space:nowrap;">
          🔍 BESAR</button>
      </div>
      <span id="zoom-hint"
        style="position:absolute; bottom:clamp(2px,0.5vh,5px);
        font-family:'Share Tech Mono',monospace;
        font-size:clamp(6px,0.9vh,9px); color:#333; letter-spacing:0.03em;
        white-space:nowrap;">
        UBAH TAMPILAN SKALA JADWAL</span>
    </div>

    <!-- TENGAH: kosong -->
    <div></div>

    <!-- KANAN: tombol ADMIN MODE + titik tiga -->
    <div style="position:absolute; right:0; top:0; height:100%; display:flex;">

      <!-- Tombol titik tiga — hanya muncul saat admin aktif -->
      <button id="btn-admin-panel" onclick="togglePanelAdmin()"
        style="display:none; height:100%; padding:0 1.5vw;
        border:none; border-left:2px solid rgba(255,255,255,0.3);
        background:#2e7d32; color:#fff;
        font-size:clamp(10px,1.8vh,16px); cursor:pointer;
        letter-spacing:0.1em;">⋮</button>

      <!-- Tombol ADMIN -->
      <button id="btn-admin-mode" onclick="toggleAdminMode()"
        style="height:100%; padding:0 2vw;
        border:none; border-left:2px solid #900; background:#c62828; color:#fff !important;
        font-family:'Share Tech Mono',monospace; font-size:clamp(8px,1.3vh,12px);
        letter-spacing:0.08em; cursor:pointer; display:flex; align-items:center;
        justify-content:center; gap:0.8vw; white-space:nowrap;">
        <span id="admin-mode-indicator" style="font-size:clamp(12px,2vh,18px); line-height:1;">🔒</span>
        <span style="color:#fff !important;">ADMIN</span>
      </button>
    </div>
  </footer>

  <!-- ── PANEL ADMIN ── -->
  <div id="panel-admin-overlay"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:500;">
  </div>

  <div id="panel-admin"
    style="position:fixed; top:10vh; right:0; width:80vw; height:80vh;
    background:#fff; z-index:501; transform:translateX(100%);
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
    display:flex; flex-direction:column; overflow:hidden;
    border-left:3px solid #2e7d32; border-top:3px solid #2e7d32;
    border-bottom:3px solid #2e7d32; border-radius:12px 0 0 12px;
    font-family:'Share Tech Mono',monospace;">

    <!-- Header panel -->
    <div style="background:linear-gradient(90deg,#1b5e20,#2e7d32);
      padding:1.5vh 2vw; display:flex; align-items:center;
      justify-content:space-between; flex-shrink:0;">
      <span style="color:#fff; font-weight:bold; font-size:clamp(11px,1.8vh,16px);
        letter-spacing:0.1em;">⚙️ PANEL ADMIN</span>
      <button onclick="tutupPanelAdmin()"
        style="background:#c62828; border:none; color:#fff;
        width:3.5vh; height:3.5vh; border-radius:50%; cursor:pointer;
        font-size:clamp(12px,2vh,16px);">✕</button>
    </div>

    <!-- Isi panel — scrollable -->
    <div style="flex:1; overflow-y:auto; padding:1.5vh 2vw;
      display:flex; flex-direction:column; gap:1vh;">

      <!-- GRUP: Manajemen Jadwal -->
      <div class="ap-grup">
        <div class="ap-grup-label">📅 MANAJEMEN JADWAL</div>
        <button class="ap-btn" onclick="apBuatSheet()">📅 Buat Sheet Jadwal Bulan Baru</button>
        <button class="ap-btn" onclick="apArsipSheet()">🗄 Arsipkan Sheet Bulan</button>
        <button class="ap-btn" onclick="apPulihkanSheet()">📂 Lihat &amp; Pulihkan Arsip</button>
      </div>

      <!-- GRUP: Manajemen Unit & Password -->
      <div class="ap-grup">
        <div class="ap-grup-label">🔑 UNIT &amp; PASSWORD</div>
        <button class="ap-btn" onclick="adminAksi('ganti-password-unit')">🔑 Ganti Password Unit</button>
        <button class="ap-btn" onclick="adminAksi('lihat-unit')">👁 Lihat Semua Unit &amp; Password</button>
        <button class="ap-btn" onclick="adminAksi('tambah-unit')">➕ Tambah Unit Baru</button>
      </div>

      <!-- GRUP: Laporan & Rekap -->
      <div class="ap-grup">
        <div class="ap-grup-label">📊 LAPORAN &amp; REKAP</div>
        <button class="ap-btn" onclick="adminAksi('rekap-hk')">📊 Rekap HK Semua Unit Per Bulan</button>
        <button class="ap-btn" onclick="adminAksi('export-rekap')">📤 Export Rekap ke Sheet Baru</button>
      </div>

      <!-- GRUP: Pengaturan -->
      <div class="ap-grup">
        <div class="ap-grup-label">⚙️ PENGATURAN</div>
        <button class="ap-btn" onclick="adminAksi('ganti-password-admin')">⚙️ Ganti Password Admin</button>
        <button class="ap-btn" onclick="adminAksi('catatan')">📝 Catatan / Pengumuman</button>
      </div>

    </div>
  </div>

  <style>
    .ap-grup {
      display:flex; flex-direction:column; gap:0.6vh;
      border:1.5px solid #a5d6a7; border-radius:10px;
      padding:1vh 1.5vw; background:#f2f8ee;
    }
    .ap-grup-label {
      font-size:clamp(8px,1.2vh,11px); font-weight:bold;
      color:#2e7d32; letter-spacing:0.1em; margin-bottom:0.3vh;
    }
    .ap-btn {
      width:100%; padding:clamp(8px,1.3vh,14px) 2vw;
      border:1.5px solid #a5d6a7; border-radius:8px;
      background:#fff; color:#1b5e20;
      font-family:'Share Tech Mono',monospace;
      font-size:clamp(9px,1.4vh,13px);
      cursor:pointer; text-align:left;
      transition:background 0.15s, color 0.15s;
    }
    .ap-btn:hover { background:#2e7d32; color:#fff; }
    .ap-btn:active { background:#1b5e20; color:#fff; }
  </style>

  <script src="../js/jadwal.js"></script>
  <script src="../js/jadwal-edit.js"></script>
  <script src="../js/jadwal-tombol.js"></script>
  <script>
    // Set judul tabel segera setelah semua script load
    (function() {
      if (typeof _setJudulTabel !== 'undefined' && typeof JUDUL_MODE !== 'undefined' && MODE) {
        _setJudulTabel(JUDUL_MODE[MODE] || 'JADWAL KERJA');
      }
    })();

    function togglePanelAdmin() {
      const panel   = document.getElementById('panel-admin');
      const overlay = document.getElementById('panel-admin-overlay');
      const terbuka = panel.style.transform === 'translateX(0%)';
      if (terbuka) {
        tutupPanelAdmin();
      } else {
        overlay.style.display = 'block';
        panel.style.display   = 'flex';
        setTimeout(() => panel.style.transform = 'translateX(0%)', 10);
      }
    }

    function tutupPanelAdmin() {
      const panel   = document.getElementById('panel-admin');
      const overlay = document.getElementById('panel-admin-overlay');
      panel.style.transform = 'translateX(100%)';
      overlay.style.display = 'none';
    }

    function adminAksi(aksi) {
      alert('Fitur "' + aksi + '" akan segera hadir!');
    }

    // ── HELPER modal admin ──────────────────────────────
    const BULAN_NAMA_AP = ['','JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI',
                           'JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];

    function _apToast(pesan, tipe) {
      const existing = document.getElementById('ap-toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.id = 'ap-toast';
      t.textContent = pesan;
      t.style.cssText = `
        position:fixed; bottom:12vh; left:50%; transform:translateX(-50%);
        background:${tipe==='ok'?'#2e7d32':tipe==='err'?'#c62828':'#333'};
        color:#fff; padding:1vh 4vw; border-radius:6px; z-index:9999;
        font-family:'Share Tech Mono',monospace; font-size:clamp(9px,1.4vh,13px);
        white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.3);
        animation:toastFadeIn .3s ease;
      `;
      document.body.appendChild(t);
      setTimeout(() => { t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 3000);
    }

    function _apModal(html, onMount) {
      const existing = document.getElementById('ap-modal-overlay');
      if (existing) existing.remove();
      const overlay = document.createElement('div');
      overlay.id = 'ap-modal-overlay';
      overlay.style.cssText = `
        position:fixed; inset:0; background:rgba(0,0,0,0.55);
        z-index:600; display:flex; align-items:center; justify-content:center;
        font-family:'Share Tech Mono',monospace;
      `;
      overlay.innerHTML = html;
      document.body.appendChild(overlay);
      if (onMount) onMount(overlay);
    }

    function _apTutupModal() {
      const el = document.getElementById('ap-modal-overlay');
      if (el) el.remove();
    }

    // ── BUAT SHEET BULAN BARU ───────────────────────────
    function apBuatSheet() {
      tutupPanelAdmin();
      const tahunSkrg = new Date().getFullYear();
      const bulanOpt  = BULAN_NAMA_AP.slice(1).map((n,i) =>
        `<option value="${i+1}">${n}</option>`).join('');

      _apModal(`
        <div style="background:#fff; border:2px solid #000; width:clamp(280px,80vw,400px);">
          <div style="background:linear-gradient(90deg,#1b5e20,#2e7d32); padding:1.2vh 1.5vw;
            display:flex; align-items:center; justify-content:space-between;">
            <span style="color:#fff; font-weight:bold; font-size:clamp(10px,1.6vh,14px); letter-spacing:.1em;">
              📅 BUAT SHEET BULAN BARU
            </span>
            <button onclick="_apTutupModal()" style="background:#c62828; border:none; color:#fff;
              width:3vh; height:3vh; cursor:pointer; font-size:1.8vh;">✕</button>
          </div>
          <div style="padding:2vh 3vw; display:flex; flex-direction:column; gap:1.5vh;">
            <div style="display:flex; gap:2vw;">
              <div style="flex:1; display:flex; flex-direction:column; gap:.5vh;">
                <label style="font-size:clamp(8px,1.2vh,11px); color:#888; letter-spacing:.1em;">BULAN</label>
                <select id="ap-bulan" style="width:100%; padding:.8vh; border:2px solid #000;
                  font-family:'Share Tech Mono',monospace; font-size:clamp(10px,1.5vh,13px);">
                  ${bulanOpt}
                </select>
              </div>
              <div style="flex:1; display:flex; flex-direction:column; gap:.5vh;">
                <label style="font-size:clamp(8px,1.2vh,11px); color:#888; letter-spacing:.1em;">TAHUN</label>
                <input id="ap-tahun" type="number" value="${tahunSkrg}" min="2020" max="2099"
                  style="width:100%; padding:.8vh; border:2px solid #000;
                  font-family:'Share Tech Mono',monospace; font-size:clamp(10px,1.5vh,13px);">
              </div>
            </div>
            <div style="display:flex; flex-direction:column; gap:.5vh;">
              <label style="font-size:clamp(8px,1.2vh,11px); color:#888; letter-spacing:.1em;">MODE</label>
              <div style="display:flex; gap:2vw;">
                <label style="display:flex; align-items:center; gap:1vw; font-size:clamp(10px,1.5vh,13px); cursor:pointer;">
                  <input type="radio" name="ap-mode" value="KEDUANYA" checked> KEDUANYA
                </label>
                <label style="display:flex; align-items:center; gap:1vw; font-size:clamp(10px,1.5vh,13px); cursor:pointer;">
                  <input type="radio" name="ap-mode" value="PEL"> PEL
                </label>
                <label style="display:flex; align-items:center; gap:1vw; font-size:clamp(10px,1.5vh,13px); cursor:pointer;">
                  <input type="radio" name="ap-mode" value="PEN"> PEN
                </label>
              </div>
            </div>
            <div id="ap-buat-err" style="color:#c62828; font-size:clamp(8px,1.2vh,11px); min-height:1.5vh;"></div>
          </div>
          <div style="border-top:2px solid #000; display:flex;">
            <button id="ap-buat-btn" style="flex:1; height:clamp(36px,5.5vh,52px); border:none; border-right:2px solid #000;
              background:#000; color:#fff; font-family:'Share Tech Mono',monospace;
              font-size:clamp(10px,1.5vh,13px); cursor:pointer; letter-spacing:.1em;">BUAT</button>
            <button onclick="_apTutupModal()" style="flex:1; height:clamp(36px,5.5vh,52px); border:none;
              background:#fff; color:#000; font-family:'Share Tech Mono',monospace;
              font-size:clamp(10px,1.5vh,13px); cursor:pointer;">BATAL</button>
          </div>
        </div>
      `, (overlay) => {
        overlay.querySelector('#ap-buat-btn').addEventListener('click', async () => {
          const bulan = parseInt(overlay.querySelector('#ap-bulan').value);
          const tahun = overlay.querySelector('#ap-tahun').value.trim();
          const mode  = overlay.querySelector('input[name="ap-mode"]:checked').value;
          const errEl = overlay.querySelector('#ap-buat-err');
          const btn   = overlay.querySelector('#ap-buat-btn');

          if (!tahun || isNaN(tahun)) { errEl.textContent = '⚠ Tahun tidak valid'; return; }

          btn.textContent = '...'; btn.disabled = true; errEl.textContent = '';

          const modeList = mode === 'KEDUANYA' ? ['PEL','PEN'] : [mode];
          const hasil = [];
          for (const m of modeList) {
            const res = await fetchGS({ action:'buatSheetBulanBaru', mode:m, bulan, tahun });
            hasil.push(`${m}: ${res.success ? '✅' : '❌ ' + res.message}`);
          }

          _apTutupModal();
          _apToast(hasil.join(' | '), hasil.every(h=>h.includes('✅')) ? 'ok' : 'err');
          if (hasil.some(h=>h.includes('✅'))) {
            // Refresh daftar bulan
            await init();
          }
        });
      });
    }

    // ── ARSIPKAN SHEET ──────────────────────────────────
    function apArsipSheet() {
      tutupPanelAdmin();
      const bulanOpt = dataBulan.map(b =>
        `<option value="${b.value}|${b.tahun}">${BULAN_NAMA_AP[b.value]} ${b.tahun}</option>`
      ).join('');

      if (!bulanOpt) { _apToast('⚠ Tidak ada bulan aktif', 'err'); return; }

      _apModal(`
        <div style="background:#fff; border:2px solid #000; width:clamp(280px,80vw,400px);">
          <div style="background:linear-gradient(90deg,#1b5e20,#2e7d32); padding:1.2vh 1.5vw;
            display:flex; align-items:center; justify-content:space-between;">
            <span style="color:#fff; font-weight:bold; font-size:clamp(10px,1.6vh,14px); letter-spacing:.1em;">
              🗄 ARSIPKAN SHEET
            </span>
            <button onclick="_apTutupModal()" style="background:#c62828; border:none; color:#fff;
              width:3vh; height:3vh; cursor:pointer; font-size:1.8vh;">✕</button>
          </div>
          <div style="padding:2vh 3vw; display:flex; flex-direction:column; gap:1.5vh;">
            <div style="font-size:clamp(8px,1.3vh,12px); color:#555; line-height:1.6;">
              Sheet akan di-<strong>rename</strong> dan <strong>disembunyikan</strong>.<br>
              Data tetap aman, bisa dipulihkan kapan saja.
            </div>
            <div style="display:flex; flex-direction:column; gap:.5vh;">
              <label style="font-size:clamp(8px,1.2vh,11px); color:#888; letter-spacing:.1em;">PILIH BULAN</label>
              <select id="ap-arsip-bulan" style="width:100%; padding:.8vh; border:2px solid #000;
                font-family:'Share Tech Mono',monospace; font-size:clamp(10px,1.5vh,13px);">
                ${bulanOpt}
              </select>
            </div>
            <div style="display:flex; flex-direction:column; gap:.5vh;">
              <label style="font-size:clamp(8px,1.2vh,11px); color:#888; letter-spacing:.1em;">MODE</label>
              <div style="display:flex; gap:2vw;">
                <label style="display:flex; align-items:center; gap:1vw; font-size:clamp(10px,1.5vh,13px); cursor:pointer;">
                  <input type="radio" name="ap-arsip-mode" value="KEDUANYA" checked> KEDUANYA
                </label>
                <label style="display:flex; align-items:center; gap:1vw; font-size:clamp(10px,1.5vh,13px); cursor:pointer;">
                  <input type="radio" name="ap-arsip-mode" value="PEL"> PEL
                </label>
                <label style="display:flex; align-items:center; gap:1vw; font-size:clamp(10px,1.5vh,13px); cursor:pointer;">
                  <input type="radio" name="ap-arsip-mode" value="PEN"> PEN
                </label>
              </div>
            </div>
            <div id="ap-arsip-err" style="color:#c62828; font-size:clamp(8px,1.2vh,11px); min-height:1.5vh;"></div>
          </div>
          <div style="border-top:2px solid #000; display:flex;">
            <button id="ap-arsip-btn" style="flex:1; height:clamp(36px,5.5vh,52px); border:none; border-right:2px solid #000;
              background:#c62828; color:#fff; font-family:'Share Tech Mono',monospace;
              font-size:clamp(10px,1.5vh,13px); cursor:pointer; letter-spacing:.1em;">ARSIPKAN</button>
            <button onclick="_apTutupModal()" style="flex:1; height:clamp(36px,5.5vh,52px); border:none;
              background:#fff; color:#000; font-family:'Share Tech Mono',monospace;
              font-size:clamp(10px,1.5vh,13px); cursor:pointer;">BATAL</button>
          </div>
        </div>
      `, (overlay) => {
        overlay.querySelector('#ap-arsip-btn').addEventListener('click', async () => {
          const val   = overlay.querySelector('#ap-arsip-bulan').value.split('|');
          const bulan = parseInt(val[0]); const tahun = val[1];
          const mode  = overlay.querySelector('input[name="ap-arsip-mode"]:checked').value;
          const btn   = overlay.querySelector('#ap-arsip-btn');

          btn.textContent = '...'; btn.disabled = true;

          const modeList = mode === 'KEDUANYA' ? ['PEL','PEN'] : [mode];
          const hasil = [];
          for (const m of modeList) {
            const res = await fetchGS({ action:'arsipkanSheet', mode:m, bulan, tahun });
            hasil.push(`${m}: ${res.success ? '✅' : '❌ ' + res.message}`);
          }

          _apTutupModal();
          _apToast(hasil.join(' | '), hasil.every(h=>h.includes('✅')) ? 'ok' : 'err');
          if (hasil.some(h=>h.includes('✅'))) await init();
        });
      });
    }

    // ── LIHAT & PULIHKAN ARSIP ──────────────────────────
    async function apPulihkanSheet() {
      tutupPanelAdmin();

      // Ambil daftar arsip PEL & PEN
      const [resPEL, resPEN] = await Promise.all([
        fetchGS({ action:'getArsip', mode:'PEL' }),
        fetchGS({ action:'getArsip', mode:'PEN' })
      ]);

      const arsipPEL = resPEL.success ? resPEL.arsip : [];
      const arsipPEN = resPEN.success ? resPEN.arsip : [];

      // Gabung & deduplikasi berdasarkan bulan+tahun
      const map = {};
      arsipPEL.forEach(a => { map[`${a.value}|${a.tahun}`] = { ...a, pel:true, pen:false }; });
      arsipPEN.forEach(a => {
        const k = `${a.value}|${a.tahun}`;
        if (map[k]) map[k].pen = true;
        else map[k] = { ...a, pel:false, pen:true };
      });
      const list = Object.values(map).sort((a,b) =>
        parseInt(a.tahun)-parseInt(b.tahun) || a.value-b.value);

      const itemsHTML = list.length ? list.map(a => `
        <div style="display:flex; align-items:center; justify-content:space-between;
          padding:.8vh 0; border-bottom:1px solid #eee;">
          <div>
            <div style="font-size:clamp(10px,1.5vh,13px); font-weight:bold;">
              ${BULAN_NAMA_AP[a.value]} ${a.tahun}
            </div>
            <div style="font-size:clamp(8px,1.1vh,10px); color:#888;">
              ${a.pel?'PEL ':''}${a.pen?'PEN':''}
            </div>
          </div>
          <button data-bulan="${a.value}" data-tahun="${a.tahun}"
            data-pel="${a.pel}" data-pen="${a.pen}"
            class="ap-pulih-btn"
            style="padding:.5vh 2vw; border:2px solid #2e7d32; background:#fff; color:#2e7d32;
            font-family:'Share Tech Mono',monospace; font-size:clamp(9px,1.4vh,12px); cursor:pointer;">
            PULIHKAN
          </button>
        </div>
      `).join('') : '<div style="color:#aaa;font-size:clamp(9px,1.4vh,12px);padding:1vh 0;">Tidak ada arsip</div>';

      _apModal(`
        <div style="background:#fff; border:2px solid #000; width:clamp(280px,85vw,420px); max-height:80vh; display:flex; flex-direction:column;">
          <div style="background:linear-gradient(90deg,#1b5e20,#2e7d32); padding:1.2vh 1.5vw;
            display:flex; align-items:center; justify-content:space-between; flex-shrink:0;">
            <span style="color:#fff; font-weight:bold; font-size:clamp(10px,1.6vh,14px); letter-spacing:.1em;">
              📂 ARSIP JADWAL
            </span>
            <button onclick="_apTutupModal()" style="background:#c62828; border:none; color:#fff;
              width:3vh; height:3vh; cursor:pointer; font-size:1.8vh;">✕</button>
          </div>
          <div style="flex:1; overflow-y:auto; padding:1.5vh 2vw;">
            ${itemsHTML}
          </div>
          <div style="border-top:2px solid #000; padding:.8vh; flex-shrink:0; text-align:center;">
            <button onclick="_apTutupModal()" style="height:clamp(32px,5vh,44px); padding:0 4vw;
              border:2px solid #000; background:#fff; font-family:'Share Tech Mono',monospace;
              font-size:clamp(10px,1.5vh,13px); cursor:pointer;">TUTUP</button>
          </div>
        </div>
      `, (overlay) => {
        overlay.querySelectorAll('.ap-pulih-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const bulan = parseInt(btn.dataset.bulan);
            const tahun = btn.dataset.tahun;
            const pel   = btn.dataset.pel === 'true';
            const pen   = btn.dataset.pen === 'true';
            btn.textContent = '...'; btn.disabled = true;

            const modeList = [];
            if (pel) modeList.push('PEL');
            if (pen) modeList.push('PEN');
            const hasil = [];
            for (const m of modeList) {
              const res = await fetchGS({ action:'pulihkanSheet', mode:m, bulan, tahun });
              hasil.push(`${m}: ${res.success ? '✅' : '❌ ' + res.message}`);
            }
            _apTutupModal();
            _apToast(hasil.join(' | '), hasil.every(h=>h.includes('✅')) ? 'ok' : 'err');
            if (hasil.some(h=>h.includes('✅'))) await init();
          });
        });
      });
    }
  </script>
